schema_version: 1

context:
  version: "9.1.1"
  python_min: '3.10'

package:
  name: pytest
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest/pytest-${{ version }}.tar.gz
  sha256: 1088fbde8f2b49d95a549a195707afa7a76a3ce9bcadc26b6d71f0ffda5fe313

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - pytest = _pytest.config:_console_main
      - py.test = _pytest.config:_console_main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=77
    - setuptools_scm >=6.2.3
  run:
    - colorama
    - pygments >=2.7.2
    - python >=${{ python_min }}
    - iniconfig >=1.0.1
    - packaging >=22
    - pluggy >=1.5,<2
    - tomli >=1
    - exceptiongroup >=1
  run_constraints:
    - pytest-faulthandler >=2

tests:
  - python:
      imports:
        - pytest
      python_version:
        - ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - pytest -h

about:
  license: MIT
  license_file: LICENSE
  summary: Simple and powerful testing with Python.
  description: |
    The pytest framework makes it easy to write small tests, yet scales to
    support complex functional testing for applications and libraries.
  homepage: https://docs.pytest.org/en/latest/
  repository: https://github.com/pytest-dev/pytest/
  documentation: https://docs.pytest.org/en/latest/

extra:
  recipe-maintainers:
    - flub
    - goanpeca
    - nicoddemus
    - ocefpaf
    - mingwandroid
