schema_version: 1

context:
  version: 9.1.0
  python_min: '3.10'

package:
  name: pytest
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest/pytest-${{ version }}.tar.gz
  sha256: 41dd9148c08072446394cefd3d79701701335a9f4cae69ba92e39f6c7f5c061c

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - pytest = _pytest.config:_console_main
      - py.test = _pytest.config:_console_main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=77
    - setuptools_scm >=6.2.3
  run:
    - pygments >=2.7.2
    - python >=${{ python_min }}
    - iniconfig >=1.0.1
    - packaging >=22
    - pluggy >=1.5,<2
    - tomli >=1
    - exceptiongroup >=1
  run_constraints:
    - pytest-faulthandler >=2

tests:
  - python:
      imports:
        - pytest
      python_version:
        - ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pytest -h

about:
  license: MIT
  license_file: LICENSE
  summary: Simple and powerful testing with Python.
  description: |
    The pytest framework makes it easy to write small tests, yet scales to
    support complex functional testing for applications and libraries.
  homepage: https://docs.pytest.org/en/latest/
  repository: https://github.com/pytest-dev/pytest/
  documentation: https://docs.pytest.org/en/latest/

extra:
  recipe-maintainers:
    - flub
    - goanpeca
    - nicoddemus
    - ocefpaf
    - mingwandroid
